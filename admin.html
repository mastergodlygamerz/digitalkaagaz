<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Digital Kagaaz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #07070d; color: #e0e0e0; min-height: 100vh; }
    .admin-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .admin-login-box {
      background: #0e0e18; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
    }
    .admin-login-box h2 { font-size: 1.4rem; color: #fff; margin-bottom: 24px; text-align: center; }
    .admin-login-box label { display: block; color: #8a8fa0; font-size: 0.85rem; margin-bottom: 6px; font-weight: 500; }
    .admin-login-box input {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      color: #fff; font-size: 0.95rem; font-family: 'Poppins', sans-serif;
      margin-bottom: 16px;
    }
    .admin-login-box input:focus { outline: none; border-color: rgba(0,229,255,0.4); }
    .admin-login-box button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #00e5ff, #007cf0);
      border: none; border-radius: 12px; color: #fff; font-size: 1rem;
      font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif;
    }
    .admin-login-box .err { color: #ff4d6a; font-size: 0.85rem; margin-bottom: 12px; display: none; }

    /* Dashboard */
    .dashboard { display: none; padding: 24px; max-width: 1300px; margin: 0 auto; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .dash-header h1 { font-size: 1.6rem; color: #fff; }
    .dash-header h1 span { color: #00e5ff; }
    .dash-logout {
      padding: 8px 22px; background: rgba(255,77,106,0.1); color: #ff4d6a;
      border: 1px solid rgba(255,77,106,0.2); border-radius: 100px;
      font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.85rem;
    }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 24px;
    }
    .stat-card .label { font-size: 0.8rem; color: #6b7080; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 2rem; font-weight: 800; color: #00e5ff; margin-top: 6px; }
    .stat-card .sub { font-size: 0.78rem; color: #4a4e5a; margin-top: 4px; }

    .panel { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .panel h3 { font-size: 1.1rem; color: #fff; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: #6b7080; font-weight: 600; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 10px 12px; color: #b0b4be; border-bottom: 1px solid rgba(255,255,255,0.03); }
    tr:hover td { background: rgba(0,229,255,0.02); }

    .country-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .country-bar .name { width: 120px; font-size: 0.85rem; color: #b0b4be; }
    .country-bar .bar { flex: 1; height: 22px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
    .country-bar .fill { height: 100%; background: linear-gradient(90deg, #00e5ff, #007cf0); border-radius: 6px; transition: width 0.6s ease; }
    .country-bar .count { width: 40px; text-align: right; font-size: 0.8rem; color: #6b7080; font-weight: 600; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 8px 20px; font-size: 0.85rem; font-weight: 600;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 100px; cursor: pointer; color: #6b7080;
      font-family: 'Poppins', sans-serif; transition: all 0.3s;
    }
    .tab.active { background: rgba(0,229,255,0.1); color: #00e5ff; border-color: rgba(0,229,255,0.2); }

    .table-wrap { overflow-x: auto; }
    .loading { text-align: center; padding: 40px; color: #6b7080; }

    @media (max-width: 600px) {
      .dashboard { padding: 16px; }
      .stat-card .value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="admin-login" id="admin-login">
    <div class="admin-login-box">
      <h2>Admin Dashboard</h2>
      <p class="err" id="login-err"></p>
      <label for="adm-email">Email</label>
      <input type="email" id="adm-email" placeholder="admin@email.com">
      <label for="adm-pass">Password</label>
      <input type="password" id="adm-pass" placeholder="Password">
      <button id="adm-login-btn">Sign In</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>Digital<span>Kagaaz</span> Dashboard</h1>
      <button class="dash-logout" id="dash-logout">Logout</button>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="label">Total Visitors</div><div class="value" id="stat-visitors">—</div><div class="sub">All time</div></div>
      <div class="stat-card"><div class="label">Today</div><div class="value" id="stat-today">—</div><div class="sub">Visitors today</div></div>
      <div class="stat-card"><div class="label">Registered Users</div><div class="value" id="stat-users">—</div><div class="sub">Signed up</div></div>
      <div class="stat-card"><div class="label">Countries</div><div class="value" id="stat-countries">—</div><div class="sub">Unique countries</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="visitors">Visitors</button>
      <button class="tab" data-tab="users">Users</button>
      <button class="tab" data-tab="countries">Countries</button>
    </div>

    <!-- VISITORS TABLE -->
    <div class="panel" id="tab-visitors">
      <h3>Recent Visitors</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>IP</th><th>Country</th><th>City</th><th>Device</th><th>Referrer</th></tr></thead>
          <tbody id="visitors-table"></tbody>
        </table>
      </div>
    </div>

    <!-- USERS TABLE -->
    <div class="panel" id="tab-users" style="display:none">
      <h3>Registered Users</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Signed Up</th></tr></thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </div>

    <!-- COUNTRIES -->
    <div class="panel" id="tab-countries" style="display:none">
      <h3>Visitors by Country</h3>
      <div id="countries-chart"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBPYVRimtsYSdG5oIuEQpfgGaeV0wQS5QU",
      authDomain: "digitalkaagaz-c8263.firebaseapp.com",
      projectId: "digitalkaagaz-c8263",
      storageBucket: "digitalkaagaz-c8263.firebasestorage.app",
      messagingSenderId: "18588901735",
      appId: "1:18588901735:web:dfdafad03fc875ed890fc2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ADMIN EMAIL — change this to your email
    const ADMIN_EMAIL = '';

    const loginDiv = document.getElementById('admin-login');
    const dashDiv = document.getElementById('dashboard');
    const loginErr = document.getElementById('login-err');

    // Login
    document.getElementById('adm-login-btn').addEventListener('click', function () {
      const email = document.getElementById('adm-email').value.trim();
      const pass = document.getElementById('adm-pass').value;
      loginErr.style.display = 'none';
      signInWithEmailAndPassword(auth, email, pass).catch(function (err) {
        loginErr.textContent = err.message.replace('Firebase: ', '');
        loginErr.style.display = 'block';
      });
    });

    document.getElementById('dash-logout').addEventListener('click', function () {
      signOut(auth);
    });

    onAuthStateChanged(auth, function (user) {
      if (user) {
        loginDiv.style.display = 'none';
        dashDiv.style.display = 'block';
        loadDashboard();
      } else {
        loginDiv.style.display = 'flex';
        dashDiv.style.display = 'none';
      }
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var target = tab.getAttribute('data-tab');
        ['visitors', 'users', 'countries'].forEach(function (id) {
          document.getElementById('tab-' + id).style.display = id === target ? 'block' : 'none';
        });
      });
    });

    function formatDate(ts) {
      if (!ts) return '—';
      var d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s || '—';
      return d.innerHTML;
    }

    function getDevice(ua) {
      if (/mobile/i.test(ua)) return 'Mobile';
      if (/tablet|ipad/i.test(ua)) return 'Tablet';
      return 'Desktop';
    }

    async function loadDashboard() {
      // Load visitors
      var visitorsSnap = await getDocs(query(collection(db, 'visitors'), orderBy('timestamp', 'desc'), limit(200)));
      var visitors = [];
      visitorsSnap.forEach(function (doc) { visitors.push(doc.data()); });

      // Load users
      var usersSnap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc')));
      var users = [];
      usersSnap.forEach(function (doc) { users.push(doc.data()); });

      // Stats
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var todayCount = visitors.filter(function (v) {
        if (!v.timestamp) return false;
        var d = v.timestamp.toDate ? v.timestamp.toDate() : new Date(v.timestamp);
        return d >= today;
      }).length;

      var countries = {};
      visitors.forEach(function (v) {
        var c = v.country || 'Unknown';
        countries[c] = (countries[c] || 0) + 1;
      });

      document.getElementById('stat-visitors').textContent = visitors.length;
      document.getElementById('stat-today').textContent = todayCount;
      document.getElementById('stat-users').textContent = users.length;
      document.getElementById('stat-countries').textContent = Object.keys(countries).length;

      // Visitors table
      var vHtml = '';
      visitors.slice(0, 100).forEach(function (v) {
        vHtml += '<tr>'
          + '<td>' + escHtml(formatDate(v.timestamp)) + '</td>'
          + '<td>' + escHtml(v.ip) + '</td>'
          + '<td>' + escHtml(v.country) + '</td>'
          + '<td>' + escHtml(v.city) + '</td>'
          + '<td>' + escHtml(getDevice(v.userAgent || '')) + '</td>'
          + '<td>' + escHtml(v.referrer) + '</td>'
          + '</tr>';
      });
      document.getElementById('visitors-table').innerHTML = vHtml || '<tr><td colspan="6" style="text-align:center;color:#6b7080">No visitors yet</td></tr>';

      // Users table
      var uHtml = '';
      users.forEach(function (u) {
        uHtml += '<tr>'
          + '<td>' + escHtml(u.name) + '</td>'
          + '<td>' + escHtml(u.email) + '</td>'
          + '<td>' + escHtml(formatDate(u.createdAt)) + '</td>'
          + '</tr>';
      });
      document.getElementById('users-table').innerHTML = uHtml || '<tr><td colspan="3" style="text-align:center;color:#6b7080">No users yet</td></tr>';

      // Country chart
      var sorted = Object.entries(countries).sort(function (a, b) { return b[1] - a[1]; });
      var maxCount = sorted.length ? sorted[0][1] : 1;
      var cHtml = '';
      sorted.forEach(function (entry) {
        var pct = Math.round((entry[1] / maxCount) * 100);
        cHtml += '<div class="country-bar">'
          + '<div class="name">' + escHtml(entry[0]) + '</div>'
          + '<div class="bar"><div class="fill" style="width:' + pct + '%"></div></div>'
          + '<div class="count">' + entry[1] + '</div>'
          + '</div>';
      });
      document.getElementById('countries-chart').innerHTML = cHtml || '<p style="color:#6b7080">No data yet</p>';
    }
  </script>
</body>
</html>

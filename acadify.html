<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadify - Coaching Institute Management</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .proto-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 60px auto 20px;
            align-items: stretch;
        }

        .grid-card {
            background: linear-gradient(135deg, rgba(7,7,13,0.5), rgba(12,12,20,0.5));
            border: 1px solid rgba(0,229,255,0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .grid-card h2 {
            color: #00e5ff;
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-window {
            flex: 1;
            min-height: 300px;
            background: rgba(7,7,13,0.3);
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-y: auto;
            max-height: 400px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: rgba(0,229,255,0.08);
            border-left: 3px solid #00e5ff;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #eaf6ff;
            word-wrap: break-word;
        }

        .chat-message.teacher {
            background: rgba(124,58,237,0.08);
            border-left-color: #7c3aed;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(7,7,13,0.6);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 8px;
            color: #eaf6ff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        .chat-input:focus {
            outline: none;
            box-shadow: 0 6px 18px rgba(0,229,255,0.08);
            border-color: rgba(0,229,255,0.3);
        }

        .btn-send {
            padding: 10px 16px;
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: #07070d;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,229,255,0.2);
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section label {
            display: block;
            color: #00e5ff;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-section input,
        .form-section select {
            width: 100%;
            padding: 8px 10px;
            background: rgba(7,7,13,0.6);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 8px;
            color: #eaf6ff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .form-section input:focus,
        .form-section select:focus {
            outline: none;
            box-shadow: 0 6px 18px rgba(0,229,255,0.08);
            border-color: rgba(0,229,255,0.3);
        }

        .calendar-list {
            background: rgba(7,7,13,0.2);
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 12px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
            flex: 1;
        }

        .calendar-list h3 {
            color: #7c3aed;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .cal-row {
            --cal-entry-h: 36px;
            padding: 8px 10px;
            height: var(--cal-entry-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(0,229,255,0.02), rgba(124,58,237,0.02));
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'Poppins', sans-serif;
            color: #eaf6ff;
            font-size: 0.85rem;
        }

        .cal-row-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .cal-row-title {
            font-weight: 600;
            color: #00e5ff;
            margin-bottom: 2px;
        }

        .cal-row-meta {
            font-size: 0.75rem;
            color: rgba(234,246,255,0.6);
        }

        .cal-row-actions {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .btn-small {
            padding: 4px 8px;
            background: rgba(124,58,237,0.2);
            border: 1px solid rgba(124,58,237,0.3);
            color: #7c3aed;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn-small:hover {
            background: rgba(124,58,237,0.4);
        }

        .btn-small.danger {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.3);
            color: #ef4444;
        }

        .btn-small.danger:hover {
            background: rgba(239,68,68,0.4);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-primary-sm {
            flex: 1;
            padding: 8px;
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: #07070d;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-primary-sm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,229,255,0.2);
        }

        .btn-primary-sm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary-sm {
            flex: 1;
            padding: 8px;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.2);
            color: #00e5ff;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-secondary-sm:hover {
            background: rgba(0,229,255,0.15);
        }

        .class-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .class-btn {
            padding: 6px 12px;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.2);
            color: #00e5ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .class-btn.active {
            background: #00e5ff;
            color: #07070d;
            border-color: #00e5ff;
        }

        @media (max-width: 768px) {
            .proto-grid {
                grid-template-columns: 1fr;
            }
        }

        .scrollbar-styled::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-styled::-webkit-scrollbar-track {
            background: rgba(0,229,255,0.02);
        }

        .scrollbar-styled::-webkit-scrollbar-thumb {
            background: rgba(0,229,255,0.15);
            border-radius: 3px;
        }

        .scrollbar-styled::-webkit-scrollbar-thumb:hover {
            background: rgba(0,229,255,0.25);
        }

        .chat-window {
            scrollbar-color: rgba(0,229,255,0.15) rgba(0,229,255,0.02);
        }

        .calendar-list {
            scrollbar-color: rgba(0,229,255,0.15) rgba(0,229,255,0.02);
        }

        /* Availability Calendar Styles (Teams/Outlook Style) */
        .availability-calendar {
            background: rgba(7,7,13,0.3);
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            overflow-x: auto;
        }

        .availability-grid {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 1px;
            background: rgba(0,229,255,0.08);
            padding: 1px;
            min-width: 600px;
        }

        .availability-header {
            background: rgba(0,229,255,0.1);
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #00e5ff;
            border-radius: 0;
        }

        .availability-time {
            background: rgba(124,58,237,0.1);
            padding: 8px 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            color: #7c3aed;
        }

        .availability-cell {
            background: rgba(7,7,13,0.6);
            aspect-ratio: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,229,255,0.08);
            min-height: 40px;
        }

        .availability-cell:hover {
            background: rgba(0,229,255,0.1);
            border-color: rgba(0,229,255,0.2);
        }

        .availability-cell.available {
            background: rgba(34,197,94,0.25);
            border-color: rgba(34,197,94,0.4);
            box-shadow: inset 0 0 8px rgba(34,197,94,0.2);
        }

        .availability-cell.busy {
            background: rgba(239,68,68,0.25);
            border-color: rgba(239,68,68,0.4);
            box-shadow: inset 0 0 8px rgba(239,68,68,0.2);
        }

        .availability-cell.out-of-office {
            background: rgba(168,85,247,0.25);
            border-color: rgba(168,85,247,0.4);
            box-shadow: inset 0 0 8px rgba(168,85,247,0.2);
        }

        .availability-cell.tentative {
            background: rgba(251,191,36,0.25);
            border-color: rgba(251,191,36,0.4);
            box-shadow: inset 0 0 8px rgba(251,191,36,0.2);
        }

        .availability-legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,229,255,0.02);
            border-radius: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #eaf6ff;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .legend-color.available {
            background: rgba(34,197,94,0.6);
        }

        .legend-color.busy {
            background: rgba(239,68,68,0.6);
        }

        .legend-color.out-of-office {
            background: rgba(168,85,247,0.6);
        }

        .legend-color.tentative {
            background: rgba(251,191,36,0.6);
        }

        .week-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .week-selector button {
            padding: 6px 12px;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.2);
            color: #00e5ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .week-selector button:hover {
            background: rgba(0,229,255,0.15);
        }

        .week-display {
            color: #7c3aed;
            font-size: 0.9rem;
            font-weight: 600;
            flex: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">🎓 Acadify</h1>
            <!-- Nav rendered from config -->
            <div id="navRoot" class="nav-container"></div>
        </div>
    </nav>

    <div class="proto-grid">
        <!-- Chat Section -->
        <div class="grid-card">
            <h2>📱 Class Chat</h2>
            <div class="form-section">
                <label>Select Class:</label>
                <select id="classSelect" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Choose a class</option>
                    <option value="10A">Class 10A</option>
                    <option value="10B">Class 10B</option>
                    <option value="11A">Class 11A</option>
                    <option value="12A">Class 12A</option>
                </select>
            </div>
                        <div class="chat-container">
                                <script src="config/config.js"></script>
                                <script src="components/navbar.js"></script>
                                <script>
                                    if (typeof renderNavbar === 'function') {
                                        try { renderNavbar('#navRoot'); } catch(e) { console.warn('renderNavbar failed', e); }
                                    }
                                </script>
                <div class="chat-window scrollbar-styled" id="chatWindow"></div>
                <div class="chat-input-group">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
                    <button class="btn-send" id="chatSendBtn">Send</button>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="grid-card">
            <h2>📅 Class Calendar</h2>
            <div class="form-section">
                <label>Event Title:</label>
                <input type="text" id="eventTitle" placeholder="e.g., Math Exam, Assignment Due">
            </div>
            <div class="form-section">
                <label>Date:</label>
                <input type="date" id="eventDate">
            </div>
            <div class="form-section">
                <label>Time:</label>
                <input type="time" id="eventTime">
            </div>
            <div class="form-section">
                <label>Event Type:</label>
                <select id="eventType">
                    <option value="exam">Exam</option>
                    <option value="assignment">Assignment</option>
                    <option value="class">Class</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="action-buttons">
                <button class="btn-primary-sm" id="addEventBtn">Add Event</button>
                <button class="btn-secondary-sm" id="clearEventsBtn">Clear All</button>
            </div>
            <div class="calendar-list scrollbar-styled" id="calendarList">
                <h3>Upcoming Events</h3>
            </div>
        </div>
    </div>

    <!-- Availability Calendar Section (Teams/Outlook Style) -->
    <div style="max-width: 1400px; margin: 20px auto; padding: 0 20px;">
        <div class="grid-card">
            <h2>📅 Availability Calendar (Teams/Outlook Style)</h2>
            <div class="form-section">
                <label>User Type:</label>
                <select id="userType" style="width: 100%; margin-bottom: 15px;">
                    <option value="">Select user type</option>
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>
            <div class="form-section">
                <label>Select Class (for reference):</label>
                <select id="availabilityClass" style="width: 100%; margin-bottom: 15px;">
                    <option value="">Select class</option>
                    <option value="10A">Class 10A</option>
                    <option value="10B">Class 10B</option>
                    <option value="11A">Class 11A</option>
                    <option value="12A">Class 12A</option>
                </select>
            </div>

            <!-- Week Navigation -->
            <div class="week-selector">
                <button id="prevWeekBtn">← Previous Week</button>
                <div class="week-display" id="weekDisplay">Loading...</div>
                <button id="nextWeekBtn">Next Week →</button>
            </div>

            <!-- Availability Calendar -->
            <div class="availability-calendar">
                <div class="availability-grid" id="availabilityGrid">
                    <!-- Grid will be populated by JavaScript -->
                </div>
            </div>

            <!-- Legend -->
            <div class="availability-legend">
                <div class="legend-item">
                    <div class="legend-color available"></div>
                    <span>Available (click once)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color busy"></div>
                    <span>Busy (click twice)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color out-of-office"></div>
                    <span>Out of Office (click thrice)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color tentative"></div>
                    <span>Tentative (click four times)</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons" style="margin-top: 15px;">
                <button class="btn-primary-sm" id="saveAvailabilityBtn">Save Availability</button>
                <button class="btn-secondary-sm" id="clearAvailabilityBtn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="acadify.js"></script>
</body>

                <label>Class:</label>
                <select id="attendanceClass" style="width: 100%; margin-bottom: 15px;">
                    <option value="">Select class for attendance</option>
                    <option value="10A">Class 10A</option>

                    <option value="11A">Class 11A</option>

                </select>
            </div>
            <div id="attendanceGrid" class="attendance-grid"></div>
            <div class="action-buttons" style="margin-top: 15px;">
                <button class="btn-primary-sm" id="saveAttendanceBtn">Save Attendance</button>
                <button class="btn-secondary-sm" id="markAllPresentBtn">Mark All Present</button>
            </div>
        </div>
    </div>

    <script src="acadify.js"></script>
</body>
</html>

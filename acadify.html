<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Acadify</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#070709;color:#eaf6ff;font-family:Arial}.navbar{display:flex;justify-content:center;padding:20px;background:rgba(7,7,13,0.75)}.signup-container{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(7,7,13,0.95),rgba(12,12,20,0.95));display:flex;justify-content:center;align-items:center;z-index:9999}.signup-card{background:linear-gradient(135deg,rgba(7,7,13,0.8),rgba(12,12,20,0.8));border:1px solid rgba(0,229,255,0.2);border-radius:20px;padding:40px;max-width:500px;width:90%;text-align:center}.signup-card h1{font-size:2.5rem;color:#00e5ff;margin-bottom:10px}.role-selector{display:flex;gap:15px;margin-bottom:30px}.role-btn{flex:1;padding:15px;background:rgba(0,229,255,0.1);border:2px solid rgba(0,229,255,0.2);border-radius:12px;color:#00e5ff;font-weight:600;cursor:pointer}.role-btn.active{background:#00e5ff;color:#07070d;border-color:#00e5ff}.class-selector-signup{display:none;margin-bottom:20px}.class-selector-signup.show{display:block}.class-selector-signup label{display:block;color:#00e5ff;margin-bottom:10px;font-weight:600}.class-selector-signup select{width:100%;padding:10px;background:rgba(7,7,13,0.6);border:1px solid rgba(0,229,255,0.2);border-radius:8px;color:#eaf6ff;margin-bottom:15px}.signup-btn{width:100%;padding:12px;background:linear-gradient(135deg,#00e5ff,#7c3aed);border:none;border-radius:8px;color:#07070d;font-weight:700;cursor:pointer}.user-info-bar{display:none;background:rgba(0,229,255,0.1);padding:15px;text-align:center;color:#00e5ff;font-weight:600}.user-info-bar.show{display:block}.logout-btn{padding:8px 16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:6px;cursor:pointer;margin-left:15px}#mainContent{display:none}#mainContent.show{display:block}.proto-grid{max-width:1400px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:20px}.grid-card{background:linear-gradient(135deg,rgba(12,12,20,0.5),rgba(7,7,13,0.3));border:1px solid rgba(0,229,255,0.1);border-radius:15px;padding:20px;min-height:600px}.grid-card h2{color:#00e5ff;margin-bottom:15px}.form-section{margin-bottom:15px}.form-section label{display:block;color:#00e5ff;margin-bottom:8px;font-weight:600}.form-section select,.form-section input{width:100%;padding:10px;background:rgba(7,7,13,0.6);border:1px solid rgba(0,229,255,0.2);border-radius:8px;color:#eaf6ff}.chat-window{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(0,229,255,0.1);border-radius:8px;padding:10px;overflow-y:auto;margin-bottom:10px;height:300px}.chat-message{background:rgba(0,229,255,0.05);border-left:3px solid #00e5ff;padding:8px;margin-bottom:8px;border-radius:4px}.chat-message.teacher{border-left-color:#7c3aed}.chat-input-group{display:flex;gap:10px}.chat-input{flex:1}.btn-send{padding:10px 20px;background:linear-gradient(135deg,#00e5ff,#7c3aed);border:none;border-radius:8px;color:#07070d;font-weight:600;cursor:pointer}.action-buttons{display:flex;gap:10px;margin-top:15px}.btn-primary-sm{flex:1;padding:10px;background:linear-gradient(135deg,#00e5ff,#7c3aed);border:none;border-radius:8px;color:#07070d;font-weight:600;cursor:pointer}.btn-secondary-sm{flex:1;padding:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:8px;cursor:pointer}.calendar-list{background:rgba(0,0,0,0.3);border:1px solid rgba(0,229,255,0.1);border-radius:8px;padding:10px;margin-top:15px;max-height:200px;overflow-y:auto}.student-class-info{display:none;margin-bottom:15px;padding:10px;background:rgba(0,229,255,0.1);border-radius:8px;border-left:3px solid #00e5ff}.student-class-info.show{display:block}</style></head><body><div class="signup-container" id="signupContainer"><div class="signup-card"><h1>🎓 Acadify</h1><p>Choose your role</p><div class="role-selector"><button class="role-btn" id="studentRoleBtn" onclick="selectRole('student')">👤 Student</button><button class="role-btn" id="teacherRoleBtn" onclick="selectRole('teacher')">👨‍🏫 Teacher</button></div><div class="class-selector-signup" id="classSelectSignupContainer"><label>Your Class:</label><select id="classSelectSignup"><option value="">Choose</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9">Class 9</option><option value="10">Class 10</option><option value="11">Class 11</option><option value="12">Class 12</option></select><label style="margin-top:15px;">Your Board:</label><select id="boardSelectSignup"><option value="">Choose</option><option value="CBSE">CBSE</option><option value="ICSE">ICSE</option><option value="State Board">State Board</option></select></div><button class="signup-btn" onclick="proceedToApp()">Continue</button></div></div><div class="user-info-bar" id="userInfoBar"><div style="margin-bottom:10px;"><span id="userInfoText"></span><button class="logout-btn" onclick="logout()">Logout</button></div><div id="userProfession" style="color:#7c3aed;font-size:0.9rem;border-top:1px solid rgba(0,229,255,0.1);padding-top:10px;"></div></div><div id="studentContent" style="display:none"><nav class="navbar"><h1 style="color:#00e5ff">🎓 Acadify - Student</h1></nav><div class="proto-grid"><div class="grid-card"><h2>💬 Chat</h2><div id="studentClassInfo" class="student-class-info"><p>Your Class: <span id="studentClassName"></span></p></div><div class="chat-window" id="chatWindow"></div><div class="chat-input-group"><input type="text" class="chat-input" id="chatInput" placeholder="Message..."><button class="btn-send" id="chatSendBtn">Send</button></div></div><div class="grid-card"><h2>📅 Calendar</h2><div class="form-section"><label>Title:</label><input type="text" id="eventTitle" placeholder="Event"></div><div class="form-section"><label>Date:</label><input type="date" id="eventDate"></div><div class="form-section"><label>Time:</label><input type="time" id="eventTime"></div><div class="action-buttons"><button class="btn-primary-sm" id="addEventBtn">Add</button><button class="btn-secondary-sm" id="clearEventsBtn">Clear</button></div><div class="calendar-list" id="calendarList"><h3>Events</h3></div></div></div></div></div><div id="teacherContent" style="display:none"><nav class="navbar"><h1 style="color:#00e5ff">🎓 Acadify - Teacher</h1></nav><div class="proto-grid"><div class="grid-card"><h2>📚 Class Management</h2><div class="form-section"><label>Select Class:</label><select id="teacherClassSelect"><option value="">Choose</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9">Class 9</option><option value="10">Class 10</option><option value="11">Class 11</option><option value="12">Class 12</option></select></div><div style="margin-top:15px;"><h3 style="color:#00e5ff;margin-bottom:10px;">Students</h3><div id="studentsList" style="background:rgba(0,0,0,0.3);border:1px solid rgba(0,229,255,0.1);border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;color:#eaf6ff;">No students selected</div></div></div><div class="grid-card"><h2>💬 Class Chat</h2><div style="margin-bottom:15px;color:#7c3aed;font-weight:600;">Selected Class: <span id="teacherSelectedClass" style="color:#00e5ff">None</span></div><div class="chat-window" id="teacherChatWindow"></div><div class="chat-input-group"><input type="text" class="chat-input" id="teacherChatInput" placeholder="Message to class..."><button class="btn-send" id="teacherChatSendBtn">Send</button></div></div><div class="grid-card"><h2>📅 Calendar</h2><div class="form-section"><label>Title:</label><input type="text" id="teacherEventTitle" placeholder="Event"></div><div class="form-section"><label>Date:</label><input type="date" id="teacherEventDate"></div><div class="form-section"><label>Time:</label><input type="time" id="teacherEventTime"></div><div class="action-buttons"><button class="btn-primary-sm" id="teacherAddEventBtn">Add</button><button class="btn-secondary-sm" id="teacherClearEventsBtn">Clear</button></div><div class="calendar-list" id="teacherCalendarList"><h3>Events</h3></div></div></div></div></div><script src="acadify.js"></script></body></html>

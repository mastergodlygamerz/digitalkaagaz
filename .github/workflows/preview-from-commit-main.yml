name: Preview from Commit

on:
  workflow_dispatch:
    inputs:
      commit_id:
        description: "Enter commit ID to preview"
        required: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 IMPORTANT FIX

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repo (FULL history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit exists
        run: |
          git cat-file -t ${{ github.event.inputs.commit_id }}

      - name: Checkout specific commit
        run: |
          git checkout ${{ github.event.inputs.commit_id }}

      - name: Create unique branch
        run: |
          BRANCH=preview-${{ github.event.inputs.commit_id }}-$(date +%s)
          git checkout -b $BRANCH
          git push origin $BRANCH
          echo "BRANCH_NAME=$BRANCH" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

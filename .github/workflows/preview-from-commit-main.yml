name: Preview from Commit

on:
  workflow_dispatch:
    inputs:
      commit_id:
        description: "Enter commit ID to preview"
        required: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Checkout specific commit
        run: |
          git fetch --all
          git checkout ${{ github.event.inputs.commit_id }}

      - name: Create branch from commit
        run: |
          git checkout -b preview-${{ github.event.inputs.commit_id }}
          git push origin preview-${{ github.event.inputs.commit_id }} --force

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
